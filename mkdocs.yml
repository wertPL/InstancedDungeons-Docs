site_name: InstancedDungeons Documentation
site_url: https://wertpl.github.io/InstancedDungeons-Docs/
site_description: Documentation for the InstancedDungeons Paper plugin.
site_author: we_rt

theme:
  name: material
  logo: assets/header-logo.png
  favicon: assets/header-logo.png
  language: en
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
  palette:
    - scheme: slate
      primary: indigo
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
    - scheme: default
      primary: indigo
      accent: cyan
      toggle:
        icon: material/weather-night
        name: Switch to dark mode

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/support.js

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Home: index.md
  - Start:
      - Getting Started: getting-started.md
      - Examples: examples.md
      - Commands: commands.md
      - Permissions: permissions.md
  - Configuration:
      - Dungeon Config: configuration.md
      - Objectives: objectives.md
      - Towers: towers.md
      - Complete 2.0 Reference: complete-2-0-reference.md
  - Systems:
      - Spawners and Mobs: spawners-and-mobs.md
      - Stages and Gates: stages.md
      - Loot and Rewards: loot-and-rewards.md
      - Event Commands: event-commands.md
  - Item ID Reference:
      - Potions and Arrows: item-ids/potions-and-arrows.md
      - Enchanted Books: item-ids/enchanted-books.md
  - Help:
      - Help Center: help.md
      - Troubleshooting: troubleshooting.md
      - Changelog: changelog.md
  - Pro Version:
      - Home: pro/index.md
      - Start:
          - Getting Started: pro/getting-started.md
          - Examples: pro/examples.md
          - Commands: pro/commands.md
          - Permissions: pro/permissions.md
      - Configuration:
          - Dungeon Config: pro/configuration.md
          - Objectives: pro/objectives.md
          - Towers: pro/towers.md
          - Complete 2.0 Reference: pro/complete-2-0-reference.md
      - Systems:
          - Spawners and Mobs: pro/spawners-and-mobs.md
          - Stages and Gates: pro/stages.md
          - Loot and Rewards: pro/loot-and-rewards.md
          - Event Commands: pro/event-commands.md
      - Item ID Reference:
          - Potions and Arrows: pro/item-ids/potions-and-arrows.md
          - Enchanted Books: pro/item-ids/enchanted-books.md
          - Enchant IDs: pro/item-ids/enchant-ids.md
      - Help:
          - Help Center: pro/help.md
          - Troubleshooting: pro/troubleshooting.md
          - Changelog: pro/changelog.md
  - Legacy 1.0.x Documentation:
      - Legacy 1.0.x Documentation: legacy-1-0-x.md

