site_name: InstancedDungeons Documentation
site_description: Documentation for the InstancedDungeons Paper plugin.
site_author: we_rt

theme:
  name: material
  logo: assets/header-logo.png
  favicon: assets/header-logo.png
  language: en
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
  palette:
    - scheme: slate
      primary: deep orange
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
    - scheme: default
      primary: deep orange
      accent: amber
      toggle:
        icon: material/weather-night
        name: Switch to dark mode

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/support.js

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Home: index.md
  - Start:
      - Getting Started: getting-started.md
      - Examples: examples.md
      - Commands: commands.md
      - Permissions: permissions.md
  - Configuration:
      - Dungeon Config: configuration.md
      - Objectives: objectives.md
      - Towers: towers.md
      - Complete 2.0 Reference: complete-2-0-reference.md
  - Systems:
      - Stages and Gates: stages.md
      - Loot and Rewards: loot-and-rewards.md
      - Event Commands: event-commands.md
  - Help:
      - Troubleshooting: troubleshooting.md
      - Changelog: changelog.md
  - Legacy 1.0.x Documentation: legacy-1-0-x.md

extra:
  social:
    - icon: fontawesome/solid/download
      link: https://modrinth.com/plugin/instanced-dungeon
      name: Modrinth
    - icon: fontawesome/solid/server
      link: https://www.spigotmc.org/resources/instanced-dungeon.132724/
      name: SpigotMC
    - icon: fontawesome/brands/discord
      link: https://discord.com/invite/sD4HvQh8P4
      name: Discord
    - icon: fontawesome/solid/mug-hot
      link: https://buymeacoffee.com/we_rt
      name: Buy Me a Coffee

